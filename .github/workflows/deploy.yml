# Push em main:
# 1) job verify — lint/typecheck/prisma (sem tocar no servidor)
# 2) job deploy-hostinger — git pull + build + pm2 no VPS (Hostinger)
#
# Vercel: com o projeto ligado ao mesmo repositório, o deploy de produção
# é automático em paralelo; variáveis ficam só no painel da Vercel.

name: Deploy to Hostinger

on:
  push:
    branches: [main]

# Cancela runs antigos automaticamente quando um novo push chegar
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # DATABASE_URL necessário para prisma validate/generate no CI
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'mysql://ci:ci@localhost:3306/ci' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET != '' && secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-32chars' }}
      NEXTAUTH_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validar schema Prisma
        run: npx prisma validate

      - name: Gerar cliente Prisma
        run: npx prisma generate

  deploy-hostinger:
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ secrets.DEPLOY_HOST != '' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH:-/var/www/erp-ads-ativos}"
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart erp-ads-ativos
