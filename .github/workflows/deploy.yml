# Deploy pipeline — main branch only
# verify → deploy-hostinger (se secrets configurados)

name: Deploy to Hostinger

on:
  push:
    branches: [main]

# Sem cancel-in-progress: aguarda o deploy ativo terminar antes de iniciar o próximo.
# Isso evita builds concorrentes no servidor que corrompem a pasta .next/
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'mysql://ci:ci@localhost:3306/ci' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET != '' && secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-32chars' }}
      NEXTAUTH_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validar schema Prisma
        run: npx prisma validate

      - name: Gerar cliente Prisma
        run: npx prisma generate

  deploy-hostinger:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # request_timeout garante que o SSH aguarda o build completo (~8 min) sem timeout
          command_timeout: 15m
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH:-/var/www/erp-ads-ativos}"

            echo "==> Baixando código mais recente..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Instalando dependências..."
            npm ci --prefer-offline

            echo "==> Matando qualquer build anterior que ainda esteja rodando..."
            pkill -f "next build" || true
            sleep 2

            echo "==> Limpando build anterior para garantir compilação limpa..."
            rm -rf .next

            echo "==> Buildando aplicação..."
            NODE_OPTIONS="--max-old-space-size=3000" npm run build

            echo "==> Reiniciando processo PM2..."
            pm2 restart erp-ads-ativos --update-env

            echo "==> Deploy concluido com sucesso!"
